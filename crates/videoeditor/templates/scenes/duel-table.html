<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_lib/meme.css">
<style>
  .stage {
    width: 100vw; height: 100vh; background: #0a0a10;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 10vh; box-sizing: border-box; gap: 44px;
  }
  .board-title { font-size: 80px; }
  .duel {
    display: grid; grid-template-columns: 1fr 6px 1fr; column-gap: 34px;
    row-gap: 34px; width: 92%; align-items: center;
  }
  .duel .divider { background: linear-gradient(#30363d, #21262d); height: 100%; grid-row: 1 / span 6; grid-column: 2; border-radius: 3px; }
  .duel .head { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .duel .head img { width: 190px; height: 190px; object-fit: contain; }
  .duel .head .name { font-family: 'Menlo', monospace; font-size: 56px; font-weight: 700; color: #fff; }
  .cell {
    font-family: 'Menlo', monospace; text-align: center;
    font-size: 46px; line-height: 1.3; color: #c9d1d9;
    background: rgba(255,255,255,0.045); border-radius: 16px; padding: 26px 18px;
    visibility: hidden;
  }
  .cell.hot   { color: #79c0ff; }   /* tokio side accent */
  .cell.work  { color: #7ee787; }   /* rayon side accent */
  .cell.big { font-family: MemeStack, Impact, sans-serif; font-size: 64px;
              color: #fff; background: none; }
</style>
<script type="application/json" id="template-info">
{
  "description": "two-column concept duel — cells pop as the narration names them, last row is the verdict",
  "keys": {
    "title": "headline",
    "left / right": "column logo images",
    "left_label / right_label": "column names",
    "rows": "cells 'left:right|left:right|…' — last row renders big",
    "row_pops": "pop times 'l:r,l:r,…' (s), one pair per row"
  },
  "demo": {
    "title": "WHEN TO USE",
    "left_label": "A",
    "right_label": "B",
    "rows": "hot loops:glue code|ship it:prototype it",
    "row_pops": "0.4:0.9,1.6:2.1",
    "duration": 3
  }
}
</script>
</head>
<body>
<div class="stage" id="stage">
  <div class="board-title meme-text" id="boardTitle"></div>
  <div class="duel" id="duel"><div class="divider"></div></div>
</div>
<script src="_lib/scene.js"></script>
<script>
  // DATA: title="THE RULE" left=<img> right=<img> left_label=tokio right_label=rayon
  //       rows="async I/O:CPU-bound|network · db:hashing · math|..."
  //       row_pops="1.0,4.5,8.0"  (seconds; big= marks final row as verdict)
  const rowCells = [];

  window.setupScene = (d) => {
    boardTitle.textContent = d.title || 'THE RULE';
    const duel = document.getElementById('duel');
    // header row (always visible)
    for (const side of ['left', 'right']) {
      const h = document.createElement('div');
      h.className = 'head';
      h.style.gridColumn = side === 'left' ? 1 : 3;
      h.style.gridRow = 1;
      h.innerHTML = '<img alt=""><div class="name"></div>';
      if (d[side]) h.querySelector('img').src = d[side];
      h.querySelector('.name').textContent = d[side + '_label'] || '';
      duel.appendChild(h);
    }
    const rows = String(d.rows || '').split('|').filter(Boolean);
    rows.forEach((r, i) => {
      const [l, rt] = r.split(':');
      const isBig = i === rows.length - 1;
      const pair = [];
      [[l, 1, 'hot'], [rt, 3, 'work']].forEach(([text, col, accent]) => {
        const c = document.createElement('div');
        c.className = 'cell ' + accent + (isBig ? ' big' : '');
        c.textContent = text;
        c.style.gridColumn = col;
        c.style.gridRow = i + 2;
        duel.appendChild(c);
        pair.push(c);
      });
      rowCells.push(pair);
    });
  };

  window.renderScene = (t) => {
    // row_pops="left:right,left:right,..." — each cell pops when the
    // narration actually says it (columns fill independently)
    const pops = String(SCENE.d.row_pops || '').split(',').map(pair => {
      const [l, r] = pair.split(':').map(Number);
      return [l, r ?? l + 0.15];
    });
    rowCells.forEach((pair, i) => {
      const [la, ra] = pops[i] ?? [i * 2, i * 2 + 0.15];
      applyPop(pair[0], la * 1000, t);
      applyPop(pair[1], ra * 1000, t);
    });
  };
</script>
</body>
</html>
